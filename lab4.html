<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 4: CSS Methods</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        .internal-subheading {
            color: darkgreen;
            text-decoration: underline;
        }
        .internal-paragraph {
            font-family: Arial, sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1 style="color: blue; text-align: center;">Heading with Inline CSS</h1>
    <p style="font-weight: bold; color: gray;">This paragraph uses inline CSS styling.</p>

    <h2 class="internal-subheading">Sub-heading with Internal CSS</h2>
    <p class="internal-paragraph">This paragraph is styled using Internal CSS defined in the head section.</p>

    <h2 class="external-heading">Sub-heading with External CSS</h2>
    <p class="external-paragraph">This paragraph is styled using the external style.css file.</p>

    <hr>

</body>
</html>
